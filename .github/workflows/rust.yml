on: [push]
env:
  SENTINEL_PORT: "8000"
  SENTINEL_HOST: "127.0.0.1"
name: Sentinel CI
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: "Running unit tests."
        uses: actions-rs/cargo@v1
        with:
          command: test kleah-backend
